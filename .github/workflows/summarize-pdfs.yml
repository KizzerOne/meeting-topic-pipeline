name: Generate PDF Chat Summaries

on:
  push:
    paths:
      - "input-files/**"
      - "pdf-chat-summaries/**/*.md"
      - ".github/workflows/summarize-pdfs.yml"
      - "src/**"
      - ".claude/skills/**"
      - "package*.json"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: pdf-chat-summaries-${{ github.ref }}
  cancel-in-progress: false

jobs:
  summarize:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Preserve UTF-8 paths in Git output
        run: git config core.quotePath false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.23"

      - name: Install document extraction tools
        run: |
          sudo apt-get update
          sudo apt-get install -y fonts-droid-fallback fonts-noto-cjk poppler-utils tesseract-ocr tesseract-ocr-chi-sim unzip
          go install github.com/conductor-oss/markitdown/cmd/markitdown@latest
          echo "$HOME/go/bin" >> "$GITHUB_PATH"

      - name: Install dependencies
        run: npm ci

      - name: Check source
        run: npm run check

      - name: Sync latest branch state
        if: github.event_name == 'push'
        run: git pull --ff-only origin "${GITHUB_REF_NAME}" || true

      - name: Collect changed input files
        id: changed-inputs
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            find input-files -type f \
              -path "input-files/*" \
              \( -name "*.pdf" -o -name "*.txt" -o -name "*.md" -o -name "*.csv" -o -name "*.json" -o -name "*.jsonl" -o -name "*.log" -o -name "*.docx" -o -name "*.pptx" -o -name "*.xlsx" -o -name "*.xls" -o -name "*.html" -o -name "*.htm" -o -name "*.xml" -o -name "*.rss" -o -name "*.atom" -o -name "*.epub" -o -name "*.ipynb" -o -name "*.png" -o -name "*.jpg" -o -name "*.jpeg" -o -name "*.step" -o -name "*.stp" -o -name "*.stl" -o -name "*.obj" -o -name "*.sldprt" -o -name "*.sldasm" -o -name "*.zip" \) \
              | sort > changed-inputs.txt
            find pdf-chat-summaries -type f -name "*.md" | sort > changed-render-markdowns.txt
          elif git cat-file -e "${{ github.event.before }}" 2>/dev/null; then
            git -c core.quotePath=false diff --name-only --diff-filter=AM "${{ github.event.before }}" "${{ github.sha }}" \
              | grep -Ei '^input-files/.+\.(pdf|txt|md|csv|json|jsonl|log|docx|pptx|xlsx|xls|html|htm|xml|rss|atom|epub|ipynb|png|jpg|jpeg|step|stp|stl|obj|sldprt|sldasm|zip)$' \
              | sort > changed-inputs.txt || true
            git -c core.quotePath=false diff --name-only --diff-filter=AM "${{ github.event.before }}" "${{ github.sha }}" \
              | grep -Ei '^pdf-chat-summaries/.+\.md$' \
              | grep -Ev '^pdf-chat-summaries/KPIT会议/' \
              | sort > changed-render-markdowns.txt || true
          else
            git -c core.quotePath=false diff-tree --no-commit-id --name-only -r "${{ github.sha }}" \
              | grep -Ei '^input-files/.+\.(pdf|txt|md|csv|json|jsonl|log|docx|pptx|xlsx|xls|html|htm|xml|rss|atom|epub|ipynb|png|jpg|jpeg|step|stp|stl|obj|sldprt|sldasm|zip)$' \
              | sort > changed-inputs.txt || true
            git -c core.quotePath=false diff-tree --no-commit-id --name-only -r "${{ github.sha }}" \
              | grep -Ei '^pdf-chat-summaries/.+\.md$' \
              | grep -Ev '^pdf-chat-summaries/KPIT会议/' \
              | sort > changed-render-markdowns.txt || true
          fi
          touch changed-inputs.txt changed-render-markdowns.txt

          python - <<'PY'
          from pathlib import Path
          import re

          supported_sidecars = {'.pdf', '.txt', '.md', '.csv', '.json', '.jsonl', '.log', '.docx', '.pptx', '.xlsx', '.xls', '.html', '.htm', '.xml', '.rss', '.atom', '.epub', '.ipynb'}
          model_exts = {'.step', '.stp', '.stl', '.obj', '.sldprt', '.sldasm'}
          supported_exts = supported_sidecars | model_exts | {'.png', '.jpg', '.jpeg', '.zip'}

          def output_folder_for_input(item):
              path = Path(item)
              relative_without_ext = path.with_suffix('')
              if relative_without_ext.parts and relative_without_ext.parts[0] == 'input-files':
                  relative_without_ext = Path(*relative_without_ext.parts[1:])
              safe_parts = []
              for part in relative_without_ext.parts:
                  cleaned = re.sub(r'[\\/:*?"<>|]', '_', part)
                  cleaned = re.sub(r'\s+', '_', cleaned).strip(' .')
                  safe_parts.append(cleaned or 'input')
              return Path('pdf-chat-summaries', *safe_parts)

          files = [line.strip() for line in Path('changed-inputs.txt').read_text(encoding='utf-8').splitlines() if line.strip()]
          model_keys = {
              (str(Path(item).parent).lower(), Path(item).stem.lower())
              for item in files
              if Path(item).suffix.lower() in model_exts
          }
          filtered = []
          for item in files:
              path = Path(item)
              key = (str(path.parent).lower(), path.stem.lower())
              if path.suffix.lower() in supported_sidecars and key in model_keys:
                  continue
              filtered.append(item)

          seen = set(filtered)
          for input_path in sorted(Path('input-files').rglob('*')):
              if not input_path.is_file() or input_path.suffix.lower() not in supported_exts:
                  continue
              item = input_path.as_posix()
              if item in seen:
                  continue
              output_dir = output_folder_for_input(item)
              if not output_dir.exists() or not any(output_dir.glob('*.md')):
                  filtered.append(item)
                  seen.add(item)

          Path('changed-inputs.txt').write_text('\n'.join(filtered) + ('\n' if filtered else ''), encoding='utf-8')
          PY

          echo "Changed input files:"
          cat changed-inputs.txt
          echo "Changed Markdown files to render:"
          cat changed-render-markdowns.txt

      - name: Generate summaries
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_VISION_API_KEY: ${{ secrets.OPENAI_VISION_API_KEY || secrets.OPENAI_API_KEY }}
          OPENAI_BASE_URL: ${{ vars.OPENAI_BASE_URL || 'https://api.deepseek.com' }}
          OPENAI_VISION_BASE_URL: ${{ vars.OPENAI_VISION_BASE_URL || vars.OPENAI_BASE_URL || 'https://api.deepseek.com' }}
          OPENAI_MODEL: ${{ vars.OPENAI_MODEL || 'deepseek-v4-flash' }}
          OPENAI_VISION_MODEL: ${{ vars.OPENAI_VISION_MODEL || vars.OPENAI_MODEL || 'deepseek-v4-flash' }}
          CLAWHUB_MARKDOWN_URL: ${{ vars.CLAWHUB_MARKDOWN_URL || 'https://markdown.new/convert' }}
          CLAWHUB_HTML_URL: ${{ vars.CLAWHUB_HTML_URL || '' }}
          PDF_FONT_PATH: /usr/share/fonts/truetype/droid/DroidSansFallbackFull.ttf
          OCR_LANG: chi_sim+eng
          TAVILY_API_KEY: ${{ secrets.TAVILY_API_KEY }}
        run: |
          if [ ! -s changed-inputs.txt ]; then
            if [ -s changed-render-markdowns.txt ]; then
              echo "Generating separate visual HTML pages for changed Markdown files."
              render_inputs=()
              while IFS= read -r markdown_file; do
                if [ -f "$markdown_file" ]; then
                  render_inputs+=("$markdown_file")
                fi
              done < changed-render-markdowns.txt
              if [ "${#render_inputs[@]}" -gt 0 ]; then
                npm start -- --render-markdown-to-html-only --input "${render_inputs[@]}"
                npm start -- --update-meeting-knowledge-only
                npm start -- --publish-docs-only
              fi
            else
              echo "No new or changed input files found. Nothing to summarize."
              npm start -- --publish-docs-only
            fi
          else
            while IFS= read -r input_file; do
              if [ ! -f "$input_file" ]; then
                echo "Skipping missing file: $input_file"
                continue
              fi

              npm start -- --input "$input_file" --out-dir pdf-chat-summaries --output-by-input-name --disable-meeting-knowledge-update
            done < changed-inputs.txt

            npm start -- --update-meeting-knowledge-only
            npm start -- --publish-docs-only
          fi

      - name: Commit generated summaries
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -f pdf-chat-summaries
          git add -f meeting-knowledge
          git add -f docs
          if git diff --cached --quiet; then
            echo "No generated summaries to commit."
            exit 0
          fi
          git commit -m "Add generated PDF chat summaries"
          git pull --rebase -X theirs origin "${GITHUB_REF_NAME}"
          git push origin "HEAD:${GITHUB_REF_NAME}"
